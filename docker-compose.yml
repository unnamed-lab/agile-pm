services:
  postgres:
    image: postgres:15-alpine
    container_name: apms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: herald
      POSTGRES_PASSWORD: herald_dev
      POSTGRES_DB: agilepm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U herald"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
