version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agilepm
      POSTGRES_PASSWORD: agilepm_secret
      POSTGRES_DB: agilepm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agilepm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
